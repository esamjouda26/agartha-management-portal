<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reorder Points</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        space: '#020408',
                        panel: 'rgba(10, 20, 30, 0.7)',
                        gold: '#d4af37',
                        bronze: '#806b45',
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.5);
        }

        .glass-panel {
            background-color: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-panel:hover {
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23d4af37' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }

        body {
            background-color: transparent;
            color: #e2e8f0;
        }

        .inline-input {
            background-color: transparent;
            border: 1px solid transparent;
            padding: 4px 8px;
            border-radius: 4px;
            width: 80px;
            text-align: center;
            transition: all 0.2s ease;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #e2e8f0;
        }

        .inline-input:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background-color: rgba(2, 4, 8, 0.5);
        }

        .inline-input:focus {
            border-color: rgba(212, 175, 55, 0.5);
            background-color: #020408;
            outline: none;
            color: #d4af37;
        }

        /* Custom checkbox */
        .row-check {
            accent-color: #d4af37;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Toggle switch for filter */
        .filter-toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .filter-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .filter-toggle .slider {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            margin-right: 8px;
        }

        .filter-toggle .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: #94a3b8;
            border-radius: 50%;
            transition: 0.3s;
        }

        .filter-toggle input:checked+.slider {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .filter-toggle input:checked+.slider:before {
            transform: translateX(16px);
            background-color: #ef4444;
        }
    </style>
</head>

<body class="font-inter p-6 space-y-8 h-screen overflow-y-auto pb-24 relative">

    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="font-cinzel text-xl text-gold flex items-center tracking-wider">
                <i data-lucide="alert-triangle" class="w-6 h-6 mr-3"></i> Reorder Points
            </h3>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Stock Level Monitoring & Automated PO
                Generation</p>
        </div>
        <div class="flex items-center space-x-4">
            <!-- Low Stock Toggle -->
            <label class="filter-toggle">
                <input type="checkbox" id="low-stock-toggle" onchange="renderTable()">
                <span class="slider"></span>
                <span class="text-xs text-gray-300 uppercase tracking-widest font-semibold">Show Low Stock Only</span>
            </label>

            <!-- Create Draft POs -->
            <button id="btn-create-pos" onclick="createDraftPOs()" disabled
                class="bg-gradient-to-r from-bronze to-gold hover:from-gold hover:to-yellow-300 text-space font-bold px-5 py-2.5 rounded shadow-[0_0_15px_rgba(212,175,55,0.3)] hover:shadow-[0_0_25px_rgba(212,175,55,0.5)] transition-all flex items-center text-sm uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed disabled:shadow-none disabled:hover:from-bronze disabled:hover:to-gold">
                <i data-lucide="file-plus" class="w-4 h-4 mr-2 fill-space"></i> Create Draft POs
            </button>
        </div>
    </div>

    <!-- KPI Strip -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
                    <i data-lucide="package" class="w-4 h-4 text-blue-400"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Total Tracked</p>
                    <p class="text-xl font-orbitron text-white font-bold" id="kpi-total">0</p>
                </div>
            </div>
        </div>
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded bg-red-500/10 border border-red-500/20 flex items-center justify-center">
                    <i data-lucide="alert-circle" class="w-4 h-4 text-red-400"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Below Reorder</p>
                    <p class="text-xl font-orbitron text-red-400 font-bold" id="kpi-low">0</p>
                </div>
            </div>
        </div>
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div
                    class="w-9 h-9 rounded bg-green-500/10 border border-green-500/20 flex items-center justify-center">
                    <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Healthy Stock</p>
                    <p class="text-xl font-orbitron text-green-400 font-bold" id="kpi-healthy">0</p>
                </div>
            </div>
        </div>
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded bg-gold/10 border border-gold/20 flex items-center justify-center">
                    <i data-lucide="truck" class="w-4 h-4 text-gold"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">On Order (Pipeline)</p>
                    <p class="text-xl font-orbitron text-gold font-bold" id="kpi-pipeline">0</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Data Table -->
    <section>
        <div class="glass-panel rounded-lg overflow-hidden flex flex-col min-h-[500px]">
            <div class="overflow-x-auto flex-1">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="text-xs text-gray-500 uppercase tracking-wider bg-[#010204] border-b border-white/10">
                        <tr>
                            <th class="px-4 py-4 font-semibold w-10">
                                <input type="checkbox" id="select-all" class="row-check"
                                    onchange="toggleAll(this.checked)">
                            </th>
                            <th class="px-4 py-4 font-semibold">Product ID</th>
                            <th class="px-4 py-4 font-semibold">Name</th>
                            <th class="px-4 py-4 font-semibold">Supplier</th>
                            <th class="px-4 py-4 font-semibold">Item Type</th>
                            <th class="px-4 py-4 font-semibold">Sell-Through (30d)</th>
                            <th class="px-4 py-4 font-semibold">On Hand</th>
                            <th class="px-4 py-4 font-semibold">On Order</th>
                            <th class="px-4 py-4 font-semibold text-gold">Effective Stock</th>
                            <th class="px-4 py-4 font-semibold">Alert</th>
                            <th class="px-4 py-4 font-semibold">Reorder Point</th>
                            <th class="px-4 py-4 font-semibold">Reorder Amt</th>
                        </tr>
                    </thead>
                    <tbody id="reorder-table-body" class="divide-y divide-white/5 font-mono text-xs">
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Toast notification -->
    <div id="toast"
        class="fixed bottom-8 right-8 bg-green-500/20 border border-green-500/40 text-green-400 px-6 py-3 rounded-lg shadow-lg backdrop-blur-sm text-sm font-semibold flex items-center space-x-2 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none z-50">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg">Draft POs created successfully.</span>
    </div>

    <script>
        lucide.createIcons();

        // ── Suppliers (shared reference) ──
        const suppliers = [
            { id: 'SUP-01', name: 'Cahaya Distributors' },
            { id: 'SUP-02', name: 'Seri Alam Trading' },
            { id: 'SUP-03', name: 'Metro F&B Supply Co.' },
            { id: 'SUP-04', name: 'KL Fresh Imports' },
            { id: 'SUP-05', name: 'Johor Paper & Pack' },
        ];

        function getSupplierName(id) {
            const s = suppliers.find(s => s.id === id);
            return s ? s.name : '—';
        }

        // ── Reorder Data ──
        let reorderData = [
            { productId: 'PRD-1045', name: 'Mineral Water 500ml', supplierId: 'SUP-01', type: 'Prepackaged', sellThrough: 92, onHand: 18, onOrder: 0, reorderPoint: 50, reorderAmt: 120, selected: false },
            { productId: 'PRD-1046', name: 'Craft Cola 330ml', supplierId: 'SUP-01', type: 'Prepackaged', sellThrough: 78, onHand: 45, onOrder: 60, reorderPoint: 40, reorderAmt: 80, selected: false },
            { productId: 'PRD-1047', name: 'Artisan Chips 50g', supplierId: 'SUP-02', type: 'Prepackaged', sellThrough: 65, onHand: 12, onOrder: 0, reorderPoint: 30, reorderAmt: 60, selected: false },
            { productId: 'PRD-1048', name: 'Organic Granola Bar', supplierId: 'SUP-04', type: 'Prepackaged', sellThrough: 54, onHand: 70, onOrder: 0, reorderPoint: 25, reorderAmt: 50, selected: false },
            { productId: 'PRD-1049', name: 'Raw Beef Tenderloin', supplierId: 'SUP-04', type: 'Raw Ingredient', sellThrough: 88, onHand: 3, onOrder: 10, reorderPoint: 15, reorderAmt: 20, selected: false },
            { productId: 'PRD-1050', name: 'Fresh Atlantic Salmon', supplierId: 'SUP-04', type: 'Raw Ingredient', sellThrough: 72, onHand: 2, onOrder: 0, reorderPoint: 10, reorderAmt: 15, selected: false },
            { productId: 'PRD-1053', name: 'Cold Brew Coffee 250ml', supplierId: 'SUP-03', type: 'Prepackaged', sellThrough: 85, onHand: 8, onOrder: 0, reorderPoint: 20, reorderAmt: 48, selected: false },
        ];

        function typeBadge(type) {
            switch (type) {
                case 'Prepackaged': return `<span class="px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 text-[10px] border border-blue-500/20 font-sans">${type}</span>`;
                case 'Raw Ingredient': return `<span class="px-2 py-0.5 rounded bg-amber-500/10 text-amber-400 text-[10px] border border-amber-500/20 font-sans">${type}</span>`;
                case 'Consumable': return `<span class="px-2 py-0.5 rounded bg-purple-500/10 text-purple-400 text-[10px] border border-purple-500/20 font-sans">${type}</span>`;
                default: return `<span class="text-gray-400 font-sans">${type}</span>`;
            }
        }

        function sellThroughBar(pct) {
            const color = pct >= 80 ? 'bg-green-500' : pct >= 50 ? 'bg-gold' : 'bg-red-500';
            const textColor = pct >= 80 ? 'text-green-400' : pct >= 50 ? 'text-gold' : 'text-red-400';
            return `
                <div class="flex items-center space-x-2">
                    <div class="w-20 h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div class="${color} h-full rounded-full" style="width:${pct}%"></div>
                    </div>
                    <span class="${textColor} font-sans font-semibold">${pct}%</span>
                </div>`;
        }

        function renderTable() {
            const tbody = document.getElementById('reorder-table-body');
            const showLowOnly = document.getElementById('low-stock-toggle').checked;

            let filtered = reorderData;
            if (showLowOnly) {
                filtered = reorderData.filter(r => (r.onHand + r.onOrder) < r.reorderPoint);
            }

            tbody.innerHTML = '';

            filtered.forEach((r) => {
                const idx = reorderData.indexOf(r);
                const effective = r.onHand + r.onOrder;
                const isLow = effective < r.reorderPoint;

                const row = document.createElement('tr');
                row.className = `hover:bg-white/[0.02] transition-colors ${isLow ? 'bg-red-500/[0.03]' : ''}`;

                row.innerHTML = `
                    <td class="px-4 py-4">
                        <input type="checkbox" class="row-check" ${r.selected ? 'checked' : ''} onchange="toggleRow(${idx}, this.checked)">
                    </td>
                    <td class="px-4 py-4">
                        <span class="bg-space px-2 py-1 rounded border border-white/10 text-gray-400">${r.productId}</span>
                    </td>
                    <td class="px-4 py-4">
                        <p class="text-gray-200 font-bold font-sans tracking-wide">${r.name}</p>
                    </td>
                    <td class="px-4 py-4 text-gray-400 font-sans">${getSupplierName(r.supplierId)}</td>
                    <td class="px-4 py-4">${typeBadge(r.type)}</td>
                    <td class="px-4 py-4">${sellThroughBar(r.sellThrough)}</td>
                    <td class="px-4 py-4 text-gray-300 font-semibold">${r.onHand}</td>
                    <td class="px-4 py-4 ${r.onOrder > 0 ? 'text-gold' : 'text-gray-600'}">${r.onOrder > 0 ? r.onOrder : '—'}</td>
                    <td class="px-4 py-4">
                        <span class="font-orbitron text-sm font-bold ${isLow ? 'text-red-400' : 'text-green-400'}">${effective}</span>
                    </td>
                    <td class="px-4 py-4 text-center text-lg">
                        ${isLow
                        ? '<span class="inline-block w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]"></span>'
                        : '<span class="inline-block w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>'
                    }
                    </td>
                    <td class="px-4 py-4">
                        <input type="number" class="inline-input" value="${r.reorderPoint}" onchange="updateReorderPoint(${idx}, this.value)">
                    </td>
                    <td class="px-4 py-4">
                        <input type="number" class="inline-input" value="${r.reorderAmt}" onchange="updateReorderAmt(${idx}, this.value)">
                    </td>
                `;
                tbody.appendChild(row);
            });

            lucide.createIcons();
            updateKPIs();
            updateButtonState();
        }

        function updateKPIs() {
            const total = reorderData.length;
            const low = reorderData.filter(r => (r.onHand + r.onOrder) < r.reorderPoint).length;
            const healthy = total - low;
            const pipeline = reorderData.reduce((sum, r) => sum + r.onOrder, 0);

            document.getElementById('kpi-total').textContent = total;
            document.getElementById('kpi-low').textContent = low;
            document.getElementById('kpi-healthy').textContent = healthy;
            document.getElementById('kpi-pipeline').textContent = pipeline;
        }

        function toggleRow(idx, checked) {
            reorderData[idx].selected = checked;
            updateButtonState();
        }

        function toggleAll(checked) {
            const showLowOnly = document.getElementById('low-stock-toggle').checked;
            reorderData.forEach(r => {
                if (!showLowOnly || (r.onHand + r.onOrder) < r.reorderPoint) {
                    r.selected = checked;
                }
            });
            renderTable();
        }

        function updateButtonState() {
            const anySelected = reorderData.some(r => r.selected);
            const btn = document.getElementById('btn-create-pos');
            btn.disabled = !anySelected;
        }

        function updateReorderPoint(idx, val) {
            reorderData[idx].reorderPoint = parseInt(val) || 0;
            renderTable();
        }

        function updateReorderAmt(idx, val) {
            reorderData[idx].reorderAmt = parseInt(val) || 0;
        }

        function createDraftPOs() {
            const selected = reorderData.filter(r => r.selected);
            if (selected.length === 0) return;

            // Group by supplier
            const grouped = {};
            selected.forEach(r => {
                if (!grouped[r.supplierId]) grouped[r.supplierId] = [];
                grouped[r.supplierId].push(r);
            });

            const poCount = Object.keys(grouped).length;
            const itemCount = selected.length;

            // Simulate adding to pipeline
            selected.forEach(r => {
                r.onOrder += r.reorderAmt;
                r.selected = false;
            });

            showToast(`${poCount} Draft PO(s) created with ${itemCount} line item(s). Check Supplier POs tab.`);
            document.getElementById('select-all').checked = false;
            renderTable();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }, 4000);
        }

        // ── Init ──
        renderTable();
    </script>
</body>

</html>
