<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agartha OS | Management Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        space: '#020408',
                        panel: 'rgba(10, 20, 30, 0.7)',
                        gold: '#d4af37',
                        bronze: '#806b45',
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Webkit Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(10, 20, 30, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.6);
        }

        /* Glassmorphism utility */
        .glass-panel {
            background-color: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel-gold {
            background-color: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        body {
            background-color: #020408;
            background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            color: #e2e8f0;
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            border-left: 3px solid #d4af37;
            color: #d4af37;
        }
    </style>
</head>

<body class="font-inter h-screen overflow-hidden flex flex-col md:flex-row">

    <aside class="glass-panel-gold w-full md:w-72 h-auto md:h-full flex flex-col flex-shrink-0 relative z-20">
        <div class="p-6 border-b border-white/10 flex items-center space-x-4">
            <div
                class="w-10 h-10 rounded bg-gradient-to-br from-gold to-bronze flex items-center justify-center shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                <span class="font-cinzel font-bold text-space text-2xl">A</span>
            </div>
            <div>
                <h1 class="font-cinzel text-gold font-bold tracking-wider leading-tight">AGARTHA</h1>
                <p class="text-[10px] text-gray-400 tracking-widest uppercase">Management Portal</p>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-6">
            <ul id="nav-container" class="space-y-2 px-4">
            </ul>
        </nav>

        <div class="p-6 border-t border-white/10">
            <button
                class="w-full flex items-center justify-center space-x-2 py-2.5 rounded border border-white/10 hover:border-gold/50 hover:text-gold transition-colors text-sm">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative z-10">

        <header
            class="glass-panel h-20 flex-shrink-0 flex items-center justify-between px-8 border-b border-white/10 z-20">
            <div class="flex items-center space-x-4">
                <h2 id="page-title" class="font-cinzel text-xl text-white tracking-wide">Initializing...</h2>
            </div>

            <div class="flex items-center space-x-8">
                <div class="hidden lg:flex items-center space-x-6 border-r border-white/10 pr-8">
                    <div class="flex flex-col items-end">
                        <div class="flex items-center space-x-2 text-gold">
                            <i data-lucide="activity" class="w-4 h-4"></i>
                            <span class="text-[10px] uppercase tracking-widest">Live System Active</span>
                        </div>
                        <span id="live-clock" class="font-orbitron text-lg tracking-wider text-gray-200 mt-1">00:00:00
                            MYT</span>
                    </div>
                </div>

                <div class="flex items-center space-x-2 bg-space/50 p-2 rounded border border-bronze/30">
                    <i data-lucide="briefcase" class="w-4 h-4 text-bronze"></i>
                    <select id="role-simulator"
                        class="bg-transparent text-sm text-gray-300 focus:outline-none focus:ring-0 cursor-pointer">
                        <option value="fnb_manager">Simulate: F&B Manager</option>
                        <option value="merch_manager">Simulate: Merch Manager</option>
                        <option value="maintenance_manager">Simulate: Maintenance</option>
                        <option value="inventory_manager">Simulate: Inventory</option>
                        <option value="marketing_manager">Simulate: Marketing</option>
                        <option value="human_resources_manager">Simulate: HR</option>
                        <option value="compliance_manager">Simulate: Compliance</option>
                        <option value="operations_manager">Simulate: Operations</option>
                    </select>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-sm font-medium text-white">Esam</p>
                        <p id="user-role-label" class="text-xs text-gold font-orbitron tracking-wide">F&B Manager</p>
                    </div>
                    <div
                        class="w-10 h-10 rounded-full bg-space border border-gold/50 flex items-center justify-center overflow-hidden shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                        <i data-lucide="user" class="w-5 h-5 text-gold"></i>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden bg-space">
            <iframe id="content-frame" name="content-frame" class="w-full h-full border-none"
                src="about:blank"></iframe>

            <div id="welcome-placeholder"
                class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-50">
                <div class="w-24 h-24 rounded-full border border-gold/20 flex items-center justify-center mb-6">
                    <i data-lucide="coffee" class="w-10 h-10 text-gold/50"></i>
                </div>
                <h3 class="font-cinzel text-2xl text-white/50 mb-2">AGARTHA OS</h3>
                <p class="font-orbitron text-sm text-gray-500 tracking-widest">AWAITING MODULE SELECTION</p>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const navContainer = document.getElementById('nav-container');
        const pageTitle = document.getElementById('page-title');
        const roleLabel = document.getElementById('user-role-label');
        const roleSimulator = document.getElementById('role-simulator');
        const contentFrame = document.getElementById('content-frame');
        const welcomePlaceholder = document.getElementById('welcome-placeholder');

        // Centralized Routing System
        const routes = {
            fnb_manager: [
                { id: 'fnb_menu', label: 'Menu & Pricing', icon: 'utensils', title: 'Menu & Pricing Engine', file: 'FnB/fnb_menu_pricing.html' },
                { id: 'fnb_staffing', label: 'Staffing View', icon: 'users', title: 'Café Staffing & Operations', file: 'FnB/fnb_staffing_view.html' },
                { id: 'fnb_waste', label: 'Waste & Prep', icon: 'trash-2', title: 'Waste & Prep Reports', file: 'FnB/fnb_waste_prep_reports.html' },
                { id: 'fnb_margin', label: 'Margin Reporting', icon: 'pie-chart', title: 'Margin & Profitability', file: 'FnB/fnb_margin_reporting.html' },
                { id: 'fnb_supplier', label: 'Supplier Performance', icon: 'truck', title: 'Supplier Quality & Yield', file: 'FnB/fnb_supplier_performance.html' }
            ],
            merch_manager: [
                { id: 'merch_catalog', label: 'Product Catalog', icon: 'package', title: 'Product Catalog', file: 'Merch/merch_catalog.html' },
                { id: 'merch_pos', label: 'Reorder Points', icon: 'alert-triangle', title: 'Reorder Points', file: 'Merch/merch_pos.html' },
                { id: 'merch_reorder', label: 'Supplier POs', icon: 'clipboard-list', title: 'Supplier POs — Purchasing & Receiving', file: 'Merch/merch_reorder.html' },
                { id: 'merch_suppliers', label: 'Suppliers', icon: 'truck', title: 'Supplier Management', file: 'Merch/merch_suppliers.html' }
            ],
            maintenance_manager: [],
            inventory_manager: [],
            marketing_manager: [],
            human_resources_manager: [],
            compliance_manager: [],
            operations_manager: []
        };

        const roleDisplayNames = {
            fnb_manager: "F&B Manager",
            merch_manager: "Merch Manager",
            maintenance_manager: "Maintenance Manager",
            inventory_manager: "Inventory Manager",
            marketing_manager: "Marketing Manager",
            human_resources_manager: "HR Manager",
            compliance_manager: "Compliance Manager",
            operations_manager: "Operations Manager"
        };

        function renderNavigation(role) {
            navContainer.innerHTML = '';
            const links = routes[role] || [];

            if (links.length === 0) {
                navContainer.innerHTML = '<li class="text-xs text-gray-500 px-4 py-2 uppercase tracking-widest">Modules Pending...</li>';
            } else {
                links.forEach(link => {
                    const li = document.createElement('li');
                    li.className = 'nav-item rounded px-4 py-3 cursor-pointer flex items-center space-x-3 text-gray-400 border-l-[3px] border-transparent';
                    li.innerHTML = `
                        <i data-lucide="${link.icon}" class="w-5 h-5"></i>
                        <span class="font-medium text-sm">${link.label}</span>
                    `;

                    li.addEventListener('click', () => {
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'border-gold', 'text-gold', 'bg-gradient-to-r', 'from-gold/10'));
                        li.classList.add('active', 'border-gold', 'text-gold', 'bg-gradient-to-r', 'from-gold/10');

                        pageTitle.textContent = link.title;
                        contentFrame.src = link.file;
                        welcomePlaceholder.style.display = 'none';
                    });

                    navContainer.appendChild(li);
                });
            }

            lucide.createIcons();

            // Reset Workspace on role switch
            pageTitle.textContent = "Select a Module";
            contentFrame.src = "about:blank";
            welcomePlaceholder.style.display = 'flex';
            roleLabel.textContent = roleDisplayNames[role];
        }

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                timeZone: 'Asia/Kuala_Lumpur',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('live-clock').textContent = `${timeString} MYT`;
        }

        roleSimulator.addEventListener('change', (e) => {
            renderNavigation(e.target.value);
        });

        setInterval(updateClock, 1000);
        updateClock();
        renderNavigation('fnb_manager');

    </script>
</body>

</html>
