<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        space: '#020408',
                        panel: 'rgba(10, 20, 30, 0.7)',
                        gold: '#d4af37',
                        bronze: '#806b45',
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.5);
        }

        .glass-panel {
            background-color: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-panel:hover {
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23d4af37' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }

        body {
            background-color: transparent;
            color: #e2e8f0;
        }

        /* Status toggle */
        .status-toggle {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .status-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .status-toggle .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .status-toggle .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: #94a3b8;
            border-radius: 50%;
            transition: 0.3s;
        }

        .status-toggle input:checked+.slider {
            background-color: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.4);
        }

        .status-toggle input:checked+.slider:before {
            transform: translateX(18px);
            background-color: #22c55e;
        }
    </style>
</head>

<body class="font-inter p-6 space-y-8 h-screen overflow-y-auto pb-24 relative">

    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="font-cinzel text-xl text-gold flex items-center tracking-wider">
                <i data-lucide="truck" class="w-6 h-6 mr-3"></i> Suppliers
            </h3>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Vendor Master Database — Feeds Catalog & PO
                Modules</p>
        </div>
        <button onclick="openAddModal()"
            class="bg-gradient-to-r from-bronze to-gold hover:from-gold hover:to-yellow-300 text-space font-bold px-5 py-2.5 rounded shadow-[0_0_15px_rgba(212,175,55,0.3)] hover:shadow-[0_0_25px_rgba(212,175,55,0.5)] transition-all flex items-center text-sm uppercase tracking-widest">
            <i data-lucide="plus" class="w-4 h-4 mr-2 fill-space"></i> Add Supplier
        </button>
    </div>

    <!-- KPI Strip -->
    <section class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
                    <i data-lucide="building-2" class="w-4 h-4 text-blue-400"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Total Vendors</p>
                    <p class="text-xl font-orbitron text-white font-bold" id="kpi-total">0</p>
                </div>
            </div>
        </div>
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div
                    class="w-9 h-9 rounded bg-green-500/10 border border-green-500/20 flex items-center justify-center">
                    <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Active</p>
                    <p class="text-xl font-orbitron text-green-400 font-bold" id="kpi-active">0</p>
                </div>
            </div>
        </div>
        <div class="glass-panel rounded-lg p-4">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded bg-gray-500/10 border border-gray-500/20 flex items-center justify-center">
                    <i data-lucide="archive" class="w-4 h-4 text-gray-400"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Inactive</p>
                    <p class="text-xl font-orbitron text-gray-400 font-bold" id="kpi-inactive">0</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Suppliers Table -->
    <section>
        <div class="glass-panel rounded-lg overflow-hidden flex flex-col min-h-[400px]">

            <!-- Toolbar -->
            <div
                class="p-4 border-b border-white/10 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-space/40">
                <div class="relative flex-1 max-w-md">
                    <i data-lucide="search"
                        class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                    <input id="search-input" type="text" placeholder="Search by name, SSM, or contact..."
                        class="w-full bg-space border border-white/10 text-sm text-white rounded-md pl-10 pr-4 py-2 focus:outline-none focus:border-gold/50 transition-all"
                        oninput="renderTable()">
                </div>
                <select id="filter-status" onchange="renderTable()"
                    class="bg-space border border-white/10 text-xs text-gray-300 rounded-md px-3 py-2 pr-8 focus:outline-none focus:border-gold/50 cursor-pointer">
                    <option value="all">Status: All</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <div class="overflow-x-auto flex-1">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="text-xs text-gray-500 uppercase tracking-wider bg-[#010204] border-b border-white/10">
                        <tr>
                            <th class="px-5 py-4 font-semibold">Supplier ID</th>
                            <th class="px-5 py-4 font-semibold">Company Name</th>
                            <th class="px-5 py-4 font-semibold">SSM Number</th>
                            <th class="px-5 py-4 font-semibold">Contact Person</th>
                            <th class="px-5 py-4 font-semibold">Phone</th>
                            <th class="px-5 py-4 font-semibold">Email</th>
                            <th class="px-5 py-4 font-semibold">Payment Terms</th>
                            <th class="px-5 py-4 font-semibold">Status</th>
                            <th class="px-5 py-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="supplier-table-body" class="divide-y divide-white/5 text-xs">
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- ==================== ADD / EDIT SUPPLIER MODAL ==================== -->
    <div id="supplier-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-space/80 backdrop-blur-sm hidden overflow-y-auto pt-10 pb-10">
        <div
            class="glass-panel rounded-lg w-full max-w-2xl border-gold/30 shadow-[0_10px_40px_rgba(212,175,55,0.15)] flex flex-col my-auto relative">

            <!-- Modal Header -->
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-space/50 rounded-t-lg">
                <h3 id="modal-title" class="font-cinzel text-lg text-gold flex items-center tracking-wider">
                    <i data-lucide="plus-circle" class="w-5 h-5 mr-2"></i> Add Supplier
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 space-y-5 max-h-[65vh] overflow-y-auto">

                <!-- Section: Update Details -->
                <div id="modal-section-label" class="flex items-center space-x-2 border-b border-white/10 pb-2 hidden">
                    <i data-lucide="edit-2" class="w-4 h-4 text-gold"></i>
                    <p class="text-sm font-bold text-white uppercase tracking-widest">Update Details</p>
                </div>

                <!-- Row 1 -->
                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Company Name <span
                                class="text-red-400">*</span></label>
                        <input id="m-company" type="text" placeholder="e.g. Mega Souvenirs Sdn Bhd"
                            class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">SSM Number <span
                                class="text-red-400">*</span></label>
                        <input id="m-ssm" type="text" placeholder="e.g. 202001012345"
                            class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all">
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">SST Number <span
                                class="text-gray-600">(Optional)</span></label>
                        <input id="m-sst" type="text" placeholder="W10-1234-56789012"
                            class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Contact Person
                            <span class="text-red-400">*</span></label>
                        <input id="m-contact" type="text" placeholder="e.g. Ahmad Razif"
                            class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all">
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Phone Number <span
                                class="text-red-400">*</span></label>
                        <input id="m-phone" type="tel" placeholder="+60 12-345 6789"
                            class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Email Address <span
                                class="text-red-400">*</span></label>
                        <input id="m-email" type="email" placeholder="orders@company.com"
                            class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all">
                        <p id="email-error" class="text-[10px] text-red-400 hidden">Please enter a valid email address.
                        </p>
                    </div>
                </div>

                <!-- Row 4 -->
                <div class="space-y-2">
                    <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Physical / Billing
                        Address</label>
                    <textarea id="m-address" rows="2" placeholder="Unit 5, Lot 1234, Jalan Industri Utama..."
                        class="w-full bg-space border border-white/10 text-sm text-white rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 transition-all resize-none"></textarea>
                </div>

                <!-- Row 5 -->
                <div class="space-y-2">
                    <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Payment Terms</label>
                    <select id="m-terms"
                        class="w-full bg-space border border-white/10 text-sm text-gray-300 rounded-md px-4 py-2 focus:outline-none focus:border-gold/50 cursor-pointer">
                        <option value="Net 15">Net 15</option>
                        <option value="Net 30" selected>Net 30</option>
                        <option value="Net 60">Net 60</option>
                        <option value="COD">COD (Cash on Delivery)</option>
                    </select>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-5 border-t border-white/10 bg-space/80 rounded-b-lg flex items-center justify-end">
                <div class="flex space-x-3">
                    <button onclick="closeModal()"
                        class="px-4 py-2 text-sm font-medium rounded text-gray-400 hover:text-white hover:bg-white/5 transition-colors">Cancel</button>
                    <button onclick="saveSupplier()"
                        class="px-6 py-2 text-sm font-bold rounded bg-gold/20 text-gold border border-gold/50 hover:bg-gold hover:text-space transition-all shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                        Save Supplier
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"
        class="fixed bottom-8 right-8 bg-green-500/20 border border-green-500/40 text-green-400 px-6 py-3 rounded-lg shadow-lg backdrop-blur-sm text-sm font-semibold flex items-center space-x-2 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none z-50">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
        lucide.createIcons();

        // ── Suppliers Data ──
        let suppliers = [
            { id: 'SUP-01', company: 'Cahaya Distributors', ssm: '200201034567', sst: 'W10-1901-32100001', contact: 'Lim Wei Kiat', phone: '+60 12-345 6789', email: 'orders@cahayadist.com.my', address: 'No. 12, Jalan Perindustrian 4, Taman Perindustrian, 81700 Pasir Gudang, Johor', terms: 'Net 30', active: true },
            { id: 'SUP-02', company: 'Seri Alam Trading', ssm: '201501098765', sst: '', contact: 'Nor Azlina Bt Ismail', phone: '+60 17-889 9012', email: 'procurement@serialam.my', address: 'Lot 45, Jalan Seri Alam 2/3, Bandar Seri Alam, 81750 Masai, Johor', terms: 'Net 15', active: true },
            { id: 'SUP-03', company: 'Metro F&B Supply Co.', ssm: '201801056789', sst: 'W10-1805-78900045', contact: 'Danny Tan', phone: '+60 11-2233 4455', email: 'po@metrofnb.com', address: '8-1, Block C, Pusat Dagangan Larkin, 80350 Johor Bahru, Johor', terms: 'Net 30', active: true },
            { id: 'SUP-04', company: 'KL Fresh Imports', ssm: '201905023456', sst: 'W10-1909-11223344', contact: 'Raj Kumar', phone: '+60 19-876 5432', email: 'sales@klfresh.com.my', address: 'Unit 3-12, Berjaya Megamall, 50470 Kuala Lumpur', terms: 'COD', active: true },
            { id: 'SUP-05', company: 'Johor Paper & Pack', ssm: '201002045678', sst: '', contact: 'Siti Nurhaliza', phone: '+60 16-654 3210', email: 'orders@johorpp.com', address: 'No. 88, Kilang Utama, Jalan Desa Bakti, 81400 Senai, Johor', terms: 'Net 60', active: false },
        ];

        let editingIndex = null;

        function getNextId() {
            const maxNum = suppliers.reduce((max, s) => {
                const n = parseInt(s.id.split('-')[1]);
                return n > max ? n : max;
            }, 0);
            return `SUP-${String(maxNum + 1).padStart(2, '0')}`;
        }

        function termsBadge(terms) {
            const map = {
                'Net 15': { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/20' },
                'Net 30': { bg: 'bg-green-500/10', text: 'text-green-400', border: 'border-green-500/20' },
                'Net 60': { bg: 'bg-yellow-500/10', text: 'text-yellow-400', border: 'border-yellow-500/20' },
                'COD': { bg: 'bg-gold/10', text: 'text-gold', border: 'border-gold/20' },
            };
            const s = map[terms] || map['Net 30'];
            return `<span class="px-2 py-0.5 rounded ${s.bg} ${s.text} ${s.border} border text-[10px] font-sans font-semibold">${terms}</span>`;
        }

        // ── Render Table ──
        function renderTable() {
            const tbody = document.getElementById('supplier-table-body');
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;

            let filtered = suppliers.filter(s => {
                const matchSearch = s.company.toLowerCase().includes(searchVal) ||
                    s.ssm.includes(searchVal) ||
                    s.contact.toLowerCase().includes(searchVal) ||
                    s.id.toLowerCase().includes(searchVal);
                const matchStatus = statusFilter === 'all' ||
                    (statusFilter === 'Active' && s.active) ||
                    (statusFilter === 'Inactive' && !s.active);
                return matchSearch && matchStatus;
            });

            tbody.innerHTML = '';

            filtered.forEach(s => {
                const idx = suppliers.indexOf(s);
                const row = document.createElement('tr');
                row.className = `hover:bg-white/[0.02] transition-colors ${!s.active ? 'opacity-50' : ''}`;

                row.innerHTML = `
                    <td class="px-5 py-4">
                        <span class="bg-space px-2 py-1 rounded border border-white/10 text-gray-400 font-mono text-[11px]">${s.id}</span>
                    </td>
                    <td class="px-5 py-4">
                        <p class="text-gray-200 font-bold font-sans tracking-wide">${s.company}</p>
                    </td>
                    <td class="px-5 py-4 text-gray-400 font-mono">${s.ssm}</td>
                    <td class="px-5 py-4 text-gray-300 font-sans">${s.contact}</td>
                    <td class="px-5 py-4 text-gray-400 font-sans">${s.phone}</td>
                    <td class="px-5 py-4">
                        <a href="mailto:${s.email}" class="text-blue-400 hover:text-blue-300 transition-colors font-sans">${s.email}</a>
                    </td>
                    <td class="px-5 py-4">${termsBadge(s.terms)}</td>
                    <td class="px-5 py-4">
                        <label class="status-toggle" title="${s.active ? 'Active' : 'Inactive'}">
                            <input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleStatus(${idx}, this.checked)">
                            <span class="slider"></span>
                        </label>
                        <span class="ml-2 text-[10px] font-sans uppercase tracking-widest ${s.active ? 'text-green-400' : 'text-gray-500'}">${s.active ? 'Active' : 'Off'}</span>
                    </td>
                    <td class="px-5 py-4 text-right">
                        <button onclick="openEditModal(${idx})" class="p-1.5 text-gray-500 hover:text-white hover:bg-white/10 rounded" title="Edit Supplier">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            lucide.createIcons();
            updateKPIs();
        }

        function updateKPIs() {
            document.getElementById('kpi-total').textContent = suppliers.length;
            document.getElementById('kpi-active').textContent = suppliers.filter(s => s.active).length;
            document.getElementById('kpi-inactive').textContent = suppliers.filter(s => !s.active).length;
        }

        function toggleStatus(idx, isActive) {
            suppliers[idx].active = isActive;
            renderTable();
        }

        // ── Modal Logic ──
        const modal = document.getElementById('supplier-modal');

        function clearForm() {
            document.getElementById('m-company').value = '';
            document.getElementById('m-ssm').value = '';
            document.getElementById('m-sst').value = '';
            document.getElementById('m-contact').value = '';
            document.getElementById('m-phone').value = '';
            document.getElementById('m-email').value = '';
            document.getElementById('m-address').value = '';
            document.getElementById('m-terms').value = 'Net 30';
            document.getElementById('email-error').classList.add('hidden');
        }

        function openAddModal() {
            editingIndex = null;
            clearForm();
            document.getElementById('modal-title').innerHTML = '<i data-lucide="plus-circle" class="w-5 h-5 mr-2"></i> Add Supplier';
            document.getElementById('modal-section-label').classList.add('hidden');
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function openEditModal(idx) {
            editingIndex = idx;
            const s = suppliers[idx];
            document.getElementById('modal-title').innerHTML = `<i data-lucide="edit-2" class="w-5 h-5 mr-2"></i> Edit Supplier — ${s.id}`;
            document.getElementById('modal-section-label').classList.remove('hidden');

            document.getElementById('m-company').value = s.company;
            document.getElementById('m-ssm').value = s.ssm;
            document.getElementById('m-sst').value = s.sst || '';
            document.getElementById('m-contact').value = s.contact;
            document.getElementById('m-phone').value = s.phone;
            document.getElementById('m-email').value = s.email;
            document.getElementById('m-address').value = s.address;
            document.getElementById('m-terms').value = s.terms;
            document.getElementById('email-error').classList.add('hidden');

            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            modal.classList.add('hidden');
            editingIndex = null;
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function saveSupplier() {
            const company = document.getElementById('m-company').value.trim();
            const ssm = document.getElementById('m-ssm').value.trim();
            const sst = document.getElementById('m-sst').value.trim();
            const contact = document.getElementById('m-contact').value.trim();
            const phone = document.getElementById('m-phone').value.trim();
            const email = document.getElementById('m-email').value.trim();
            const address = document.getElementById('m-address').value.trim();
            const terms = document.getElementById('m-terms').value;

            // Validation
            if (!company) { alert('Company Name is required.'); return; }
            if (!ssm) { alert('SSM Number is required.'); return; }
            if (!contact) { alert('Contact Person is required.'); return; }
            if (!phone) { alert('Phone Number is required.'); return; }
            if (!email || !validateEmail(email)) {
                document.getElementById('email-error').classList.remove('hidden');
                return;
            }
            document.getElementById('email-error').classList.add('hidden');

            if (editingIndex !== null) {
                suppliers[editingIndex].company = company;
                suppliers[editingIndex].ssm = ssm;
                suppliers[editingIndex].sst = sst;
                suppliers[editingIndex].contact = contact;
                suppliers[editingIndex].phone = phone;
                suppliers[editingIndex].email = email;
                suppliers[editingIndex].address = address;
                suppliers[editingIndex].terms = terms;
                showToast(`${suppliers[editingIndex].id} updated successfully.`);
            } else {
                const newSupplier = {
                    id: getNextId(), company, ssm, sst, contact, phone, email, address, terms, active: true
                };
                suppliers.push(newSupplier);
                showToast(`${newSupplier.id} — ${company} added to vendor registry.`);
            }

            closeModal();
            renderTable();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none'), 4000);
        }

        // ── Init ──
        renderTable();
    </script>
</body>

</html>
